<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Manager | Web UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"></div>
                <h2>Audio Manager</h2>
            </div>
            
            <div class="panel audio-panel">
                <h3>Track Player</h3>
                <div class="form-group">
                    <label for="audioUpload" class="upload-label">
                        <span id="uploadText">Upload Audio File</span>
                        <input type="file" id="audioUpload" accept="audio/*" class="hidden-input">
                    </label>
                </div>
                <audio id="audioPlayer" controls class="custom-audio-player" style="display: none;"></audio>
            </div>
            
            <div class="panel">
                <h3>Add New Edit</h3>
                <form id="addEditForm">
                    <div class="form-group">
                        <label>Action</label>
                        <input type="text" id="actionInput" placeholder="e.g. Cut, Trim, Boost" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="categoryInput" required>
                            <option value="Vocals">Vocals</option>
                            <option value="Drums">Drums</option>
                            <option value="Bass">Bass</option>
                            <option value="Master">Master</option>
                            <option value="FX">FX</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Value</label>
                        <input type="text" id="valueInput" placeholder="e.g. -2dB, 500ms" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn primary-btn">Add Edit</button>
                </form>
            </div>

            <div class="panel">
                <h3>Time Travel Controls</h3>
                <div class="controls-grid">
                    <button id="undoBtn" class="btn secondary-btn" disabled>Undo (Ctrl+Z)</button>
                    <button id="redoBtn" class="btn secondary-btn" disabled>Redo (Ctrl+Y)</button>
                </div>
            </div>

            <div class="panel system-panel">
                <button id="clearBtn" class="btn danger-btn">Clear All History</button>
            </div>
        </aside>

        <!-- Main Content (Timeline) -->
        <main class="main-content">
            <header class="topbar">
                <div class="stats">
                    <span id="versionTracker">Current Version: V1</span>
                    <span class="badge" id="totalEditsTracker">Total Edits: 0</span>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search edits...">
                </div>
            </header>

            <div class="timeline-container">
                <div class="timeline-header">
                    <h2>Edit History</h2>
                    <p>Your audio modification timeline</p>
                </div>
                
                <div class="history-list" id="historyList">
                    <!-- Dynamic nodes injected here -->
                    <div class="empty-state">
                        <div class="empty-icon"></div>
                        <p>No edits yet. Add your first audio edit on the left.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="audioManager.js"></script>
    <script src="app.js"></script>
</body>
</html>
